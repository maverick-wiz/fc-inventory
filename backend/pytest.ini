[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --cov=app
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=60
    -v

# Coverage threshold set to 60% for Sprint 1 scaffold.
# Service layer (auth_service, inventory_service, order_service, calendar_service,
# report_service) integration tests are tracked under DELTA Q2 epic (FCINV-102).
# Threshold will be raised to 80% once integration test suite is complete.

