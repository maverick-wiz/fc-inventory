# FC-Inventory — Production Overrides
replicaCount: 2
environment: production
backend:
  image: harbor.local:30080/fc-inventory-backend/app:latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
frontend:
  image: harbor.local:30080/fc-inventory-frontend/app:latest
ingress:
  host: fc-inventory.production.local
