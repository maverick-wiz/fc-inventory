apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-backend
    environment: {{ .Values.environment }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
        version: {{ .Chart.AppVersion }}
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fc-inventory-secrets
                  key: database-url
            - name: REDIS_URL
              value: {{ .Values.backend.env.REDIS_URL }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fc-inventory-secrets
                  key: secret-key
            - name: ALGORITHM
              value: {{ .Values.backend.env.ALGORITHM }}
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "{{ .Values.backend.env.ACCESS_TOKEN_EXPIRE_MINUTES }}"
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
